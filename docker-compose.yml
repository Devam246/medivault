version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - apps/backend/.env
    environment:
      # These override whatever is in .env — Docker-specific service names
      - DB_HOST=mongodb
      - DATA_STORE=mongo
      - MONGO_URI=mongodb://mongodb:27017/medivault
      - MONGO_DB_NAME=medivault
      - FRONTEND_URL=http://localhost
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - uploads-data:/app/apps/backend/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Pass the backend URL so Vite bakes it into the static bundle at build time
        VITE_API_URL: http://localhost:4000
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo-data:
  uploads-data:
